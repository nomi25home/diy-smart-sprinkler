- binary_sensor:
    - name: Smart Rain Skip
      state: >
        {{ states('weather.home') in [
          'rainy',
          'pouring',
          'lightning-rainy'
        ] }}

- sensor:
    - name: Sprinkler Mode
      icon: mdi:state-machine
      state: >
        {% if is_state('input_boolean.sprinkler_manual_mode', 'on') %}
          MANUAL
        {% elif is_state('input_boolean.sprinkler_vacation_mode', 'on') %}
          VACATION
        {% elif is_state('input_boolean.sprinkler_rain_skip', 'on') or is_state('binary_sensor.smart_rain_skip', 'on') %}
          RAIN SKIP
        {% else %}
          AUTO
        {% endif %}

    - name: Vacation Countdown
      icon: mdi:airplane-clock
      state: >
        {% if is_state('input_boolean.sprinkler_vacation_mode', 'on') %}
          {% set vacation_until = as_datetime(states('input_datetime.sprinkler_vacation_until')) %}
          {% set days_left = (vacation_until.date() - now().date()).days %}
          {% if days_left <= 0 %}
            Ending today
          {% elif days_left == 1 %}
            1 day left
          {% else %}
            {{ days_left }} days left
          {% endif %}
        {% else %}
          Off
        {% endif %}

- sensor:
    - name: Sprinkler Last Ran
      unique_id: sprinkler_last_ran_display
      icon: mdi:history
      state: >
        {% set t = states('input_datetime.sprinkler_last_run') %}
        {% if t in ['unknown', 'unavailable', '', 'none'] %}
          Never
        {% else %}
          {{ as_timestamp(t) | timestamp_custom('%a %b %d, %I:%M %p') }}
        {% endif %}

- sensor:
    - name: Sprinkler Next Run
      unique_id: sprinkler_next_run_display
      icon: mdi:calendar-clock
      state: >
        {% if is_state('input_boolean.sprinkler_manual_mode', 'on') %}
          Paused: Manual Mode
        {% elif is_state('input_boolean.sprinkler_vacation_mode', 'on') %}
          Vacation until {{ states('input_datetime.sprinkler_vacation_until') }}
        {% elif is_state('input_boolean.sprinkler_rain_skip', 'on') %}
          Skipped: Manual Rain Skip
        {% elif is_state('binary_sensor.smart_rain_skip', 'on') %}
          Skipped: Rain Expected
        {% else %}
          {% set now_ts = now().timestamp() %}
          {% set today_530 = today_at('05:30').timestamp() %}
          {% set today_1730 = today_at('17:30').timestamp() %}

          {% if now_ts < today_530 %}
            {{ today_at('05:30') | as_timestamp | timestamp_custom('%a %b %d, %I:%M %p') }}
          {% elif now_ts < today_1730 %}
            {{ today_at('17:30') | as_timestamp | timestamp_custom('%a %b %d, %I:%M %p') }}
          {% else %}
            {{ (today_at('05:30') + timedelta(days=1)) | as_timestamp | timestamp_custom('%a %b %d, %I:%M %p') }}
          {% endif %}
        {% endif %}

- sensor:
    - name: Sprinkler Adjusted Runtime
      unit_of_measurement: "min"
      icon: mdi:timer-cog
      state: >
        {% set base = 20 %}
        {% set temp = state_attr('weather.home', 'temperature') | float(75) %}
        {% set condition = states('weather.home') %}

        {% set runtime =
          base
          + (5 if temp >= 85 else 0)
          + (5 if temp >= 95 else 0)
          - (5 if temp <= 65 else 0)
          - (10 if condition in ['rainy', 'pouring', 'lightning-rainy'] else 0)
        %}

        {{ [5, [runtime, 30] | min] | max }}

- sensor:
    - name: Sprinkler Active Zone
      state: >
        {% for i in range(1,7) %}
          {% if is_state('sensor.sprinkler_zone_' ~ i ~ '_state', 'True') %}
            Zone {{ i }}
          {% endif %}
        {% endfor %}
        {% if not (
          is_state('sensor.sprinkler_zone_1_state','True') or
          is_state('sensor.sprinkler_zone_2_state','True') or
          is_state('sensor.sprinkler_zone_3_state','True') or
          is_state('sensor.sprinkler_zone_4_state','True') or
          is_state('sensor.sprinkler_zone_5_state','True') or
          is_state('sensor.sprinkler_zone_6_state','True')
        ) %}
          Idle
        {% endif %}
