- platform: history_stats
  name: Sprinkler Zone 1 Runtime Today
  entity_id: sensor.sprinkler_zone_1_state
  state: "True"
  type: time
  start: "{{ now().replace(hour=0, minute=0, second=0) }}"
  end: "{{ now() }}"

