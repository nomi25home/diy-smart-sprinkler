- platform: rest
  name: Sprinkler Zone 1 State
  resource: http://<PI_IP_ADDRESS>:5050/zone/1
  value_template: "{{ value_json.on }}"
  scan_interval: 2

- platform: rest
  name: Sprinkler Zone 2 State
  resource: http://<PI_IP_ADDRESS>:5050/zone/2
  value_template: "{{ value_json.on }}"
  scan_interval: 2

