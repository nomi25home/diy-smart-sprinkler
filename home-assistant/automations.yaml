- alias: Sprinkler AM PM Schedule
  description: ""
  triggers:
    - trigger: time
      at: "05:30:00"
    - trigger: time
      at: "17:30:00"
  conditions:
    - condition: state
      entity_id: input_boolean.sprinkler_rain_skip
      state: "off"
    - condition: state
      entity_id: binary_sensor.smart_rain_skip
      state: "off"
  actions:
    - action: script.sprinkler_run_all_zones
  mode: single

- alias: Sprinkler Safety Shutoff After 20 Minutes
  description: ""
  triggers:
    - trigger: state
      entity_id:
        - sensor.sprinkler_zone_1_state
        - sensor.sprinkler_zone_2_state
        - sensor.sprinkler_zone_3_state
        - sensor.sprinkler_zone_4_state
        - sensor.sprinkler_zone_5_state
        - sensor.sprinkler_zone_6_state
      to: "True"
      for:
        minutes: 20
  actions:
    - action: rest_command.sprinkler_all_off
    - action: persistent_notification.create
      data:
        title: Sprinkler safety shutoff
        message: >
          A sprinkler zone was running for more than 20 minutes and was shut off.
          Please inspect the sprinkler automation, relay, and valve wiring.
  mode: single
